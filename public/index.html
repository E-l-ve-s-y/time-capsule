<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时光胶囊 · 交大130周年</title>
    <link rel="icon" href="https://www.sjtu.edu.cn/resource/assets/img/logo.png" type="image/png">
    
    <style>
        :root {
            --sjtu-red: #9e0023;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            /* 修正点：直接在 body 上设置背景，并叠加一个半透明遮罩 */
            background: 
                linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                url('https://v2.567899.xyz/file/06611ec44f83d61074a248b1d4056639.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            /* 备用背景色 */
            background-color: #1a1a1a; 
        }

        /* 磨砂玻璃效果的容器 */
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 30px;
            border-radius: 28px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo { width: 70px; height: 70px; margin-bottom: 15px; }
        h1 { color: var(--sjtu-red); font-size: 26px; margin-bottom: 10px; font-weight: 800; }
        .subtitle { color: #444; font-size: 14px; margin-bottom: 30px; line-height: 1.6; }

        input, textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 14px;
            margin-bottom: 15px;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.9);
            transition: 0.3s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--sjtu-red);
            box-shadow: 0 0 0 4px rgba(158, 0, 35, 0.1);
        }

        .record-btn {
            width: 100%;
            height: 120px;
            background: #fff;
            border: 2px dashed #bbb;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        .record-btn:hover { border-color: var(--sjtu-red); background: #fffcfc; }
        
        .record-btn.recording {
            border-color: var(--sjtu-red);
            background: #fff5f5;
            border-style: solid;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(158, 0, 35, 0.4); }
            70% { box-shadow: 0 0 0 12px rgba(158, 0, 35, 0); }
            100% { box-shadow: 0 0 0 0 rgba(158, 0, 35, 0); }
        }

        #recordIcon { font-size: 35px; margin-bottom: 5px; }
        .timer { font-size: 22px; font-weight: bold; color: var(--sjtu-red); font-family: monospace; }

        button#submitBtn {
            width: 100%;
            padding: 16px;
            background: var(--sjtu-red);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(158, 0, 35, 0.2);
        }
        button#submitBtn:disabled { background: #bbb; cursor: not-allowed; box-shadow: none; }

        .status { margin-top: 15px; padding: 12px; border-radius: 12px; display: none; font-size: 14px; }
        .status.show { display: block; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        audio { width: 100%; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <img class="logo" src="https://www.sjtu.edu.cn/resource/assets/img/logo.png" alt="SJTU Logo">
        <h1>时光胶囊</h1>
        <p class="subtitle">致 130 周年校庆的自己<br>录制 30s 语音，130 天后自动开启</p>
        
        <input type="email" id="email" placeholder="接收地址 (your@email.com)" required>
        
        <div class="record-btn" id="recordBtn" onclick="toggleRecord()">
            <div id="recordIcon">🎙️</div>
            <div id="recordText">点击开始录音</div>
            <div class="timer" id="timer" style="display:none">00:00</div>
        </div>
        
        <audio id="preview" controls></audio>
        <textarea id="message" rows="2" placeholder="给未来的自己留言..."></textarea>
        
        <button id="submitBtn" onclick="submit()" disabled>封存这份时光</button>
        <div class="status" id="status"></div>
    </div>

    <script>
        let recorder, chunks = [], blob, voiceUrl, recording = false, timer, seconds = 0;
        const originalTitle = document.title;

        async function toggleRecord() {
            if (!recorder) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
                    recorder = new MediaRecorder(stream);
                    recorder.ondataavailable = e => chunks.push(e.data);
                    recorder.onstop = async () => {
                        blob = new Blob(chunks, {type:'audio/webm'});
                        document.getElementById('preview').src = URL.createObjectURL(blob);
                        document.getElementById('preview').style.display = 'block';
                        showStatus('正在上传...', 'info');
                        await uploadAudio();
                    };
                } catch(err) {
                    alert('请允许麦克风权限');
                    return;
                }
            }
            
            if (!recording) {
                chunks = [];
                recorder.start();
                recording = true;
                seconds = 0;
                document.getElementById('recordBtn').classList.add('recording');
                document.getElementById('recordIcon').textContent = '⏹️';
                document.getElementById('recordText').textContent = '点击停止';
                document.getElementById('timer').style.display = 'block';
                document.title = "🔴 正在录音 - 时光胶囊";
                
                timer = setInterval(() => {
                    seconds++;
                    const m = String(Math.floor(seconds/60)).padStart(2,'0');
                    const s = String(seconds%60).padStart(2,'0');
                    document.getElementById('timer').textContent = `${m}:${s}`;
                    if (seconds >= 30) toggleRecord();
                }, 1000);
            } else {
                clearInterval(timer);
                recorder.stop();
                recording = false;
                document.getElementById('recordBtn').classList.remove('recording');
                document.getElementById('recordIcon').textContent = '🎙️';
                document.getElementById('recordText').textContent = '重新录制';
                document.getElementById('timer').style.display = 'none';
                document.title = originalTitle;
            }
        }

        async function uploadAudio() {
            try {
                const res_url = await fetch('/api/upload-url').then(r => r.json());
                const form = new FormData();
                Object.entries(res_url.params).forEach(([k,v]) => form.append(k,v));
                form.append('file', blob);
                const res = await fetch(res_url.url, {method:'POST', body:form});
                const data = await res.json();
                if (data.secure_url) {
                    voiceUrl = data.secure_url;
                    document.getElementById('submitBtn').disabled = false;
                    showStatus('✅ 语音已就绪', 'success');
                }
            } catch(e) { showStatus('上传失败', 'error'); }
        }

        async function submit() {
            const email = document.getElementById('email').value.trim();
            if(!email.includes('@')) return showStatus('邮箱格式错误', 'error');
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').textContent = '提交中...';
            try {
                const res = await fetch('/api/submit', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ email, voice_url: voiceUrl, message: document.getElementById('message').value })
                });
                const data = await res.json();
                if (data.success) {
                    showStatus(`🎉 成功！将在 ${data.send_date} 发送`, 'success');
                    setTimeout(() => location.reload(), 4000);
                }
            } catch(e) { 
                showStatus('提交失败', 'error'); 
                document.getElementById('submitBtn').disabled = false; 
            }
        }

        function showStatus(msg, type) {
            const s = document.getElementById('status');
            s.innerHTML = msg;
            s.className = 'status show ' + type;
        }
    </script>
</body>
</html>
