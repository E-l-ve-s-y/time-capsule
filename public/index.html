<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时光胶囊 · 交大130周年</title>
    <style>
        :root {
            --sjtu-red: #9e0023; /* 交大红 */
            --sjtu-gold: #c2a15f; /* 交大金 */
            --bg-gradient: linear-gradient(135deg, #8e0e00 0%, #1f1c18 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
    
        body {
            font-family: -apple-system, "Helvetica Neue", sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #333;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* 标题美化 */
        .header { text-align: center; margin-bottom: 30px; }
        h1 { 
            color: var(--sjtu-red); 
            font-size: 28px; 
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .subtitle { 
            color: #666; 
            font-size: 14px; 
            line-height: 1.6;
        }

        /* 输入框优化 */
        .input-group { margin-bottom: 20px; position: relative; }
        input, textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #eee;
            border-radius: 12px;
            font-size: 15px;
            background: #f9f9f9;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--sjtu-red);
            background: white;
            box-shadow: 0 0 0 4px rgba(158, 0, 35, 0.1);
        }

        /* 录音按钮炫酷化 */
        .record-btn {
            width: 100%;
            height: 120px;
            background: #fff;
            border: 2px dashed #ddd;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }
        .record-btn:hover { border-color: var(--sjtu-red); background: #fffcfc; }
    
        /* 录音时的呼吸脉冲效果 */
        .record-btn.recording {
            border-color: var(--sjtu-red);
            background: #fff5f5;
            border-style: solid;
        }
        .record-btn.recording::after {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            background: rgba(158, 0, 35, 0.05);
            animation: pulse-bg 1.5s infinite;
        }

        @keyframes pulse-bg {
            0% { transform: scale(0.95); opacity: 1; }
            100% { transform: scale(1.2); opacity: 0; }
        }

        #recordIcon { font-size: 32px; margin-bottom: 8px; z-index: 1; }
        #recordText { font-weight: 600; color: #555; z-index: 1; }
        .timer { font-size: 20px; color: var(--sjtu-red); font-family: monospace; z-index: 1; margin-top: 5px;}

        /* 播放器微调 */
        audio { width: 100%; margin-bottom: 20px; height: 36px; }

        /* 提交按钮 */
        button#submitBtn {
            width: 100%;
            padding: 16px;
            background: var(--sjtu-red);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(158, 0, 35, 0.2);
        }
        button#submitBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 12px 24px rgba(158, 0, 35, 0.3);
        }
        button#submitBtn:disabled { background: #ccc; box-shadow: none; }

        /* 状态提示美化 */
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-weight: 500;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .success { background: #e6f4ea; color: #1e7e34; border: 1px solid #c3e6cb; }
        .error { background: #feefef; color: #d93025; border: 1px solid #f9d6d5; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>🎙️ 时光胶囊</h1>
            <p class="subtitle">致 130 周年校庆的自己<br>录制一段音频，130天后开启</p>
        </div>

        <div class="input-group">
            <input type="email" id="email" placeholder="接收胶囊的邮箱地址" required>
        </div>

        <div class="record-btn" id="recordBtn" onclick="toggleRecord()">
            <div id="recordIcon">🎙️</div>
            <div id="recordText">开始录制语音</div>
            <div class="timer" id="timer" style="display:none">00:00</div>
        </div>

        <audio id="preview" controls style="display:none"></audio>
    
        <div class="input-group">
            <textarea id="message" rows="3" placeholder="写下一句你想说的话..."></textarea>
        </div>
    
        <button id="submitBtn" onclick="submit()" disabled>封存这份时光</button>
    
        <div class="status" id="status"></div>
    </div>

    <script>
        const API = location.origin.includes('localhost') ? '' : ''
        
        let recorder, chunks = [], blob, voiceUrl, recording = false, timer, seconds = 0

        async function toggleRecord() {
            if (!recorder) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({audio:true})
                    recorder = new MediaRecorder(stream)
                    recorder.ondataavailable = e => chunks.push(e.data)
                    recorder.onstop = async () => {
                        blob = new Blob(chunks, {type:'audio/webm'})
                        document.getElementById('preview').src = URL.createObjectURL(blob)
                        document.getElementById('preview').style.display = 'block'
                        showStatus('正在上传...', 'info')
                        await uploadAudio()
                    }
                } catch(err) {
                    alert('请允许麦克风权限')
                    return
                }
            }
            
            if (!recording) {
                chunks = []
                recorder.start()
                recording = true
                seconds = 0
                document.getElementById('recordBtn').classList.add('recording')
                document.getElementById('recordIcon').textContent = '⏹️'
                document.getElementById('recordText').textContent = '点击停止'
                document.getElementById('timer').style.display = 'block'
                
                timer = setInterval(() => {
                    seconds++
                    const m = String(Math.floor(seconds/60)).padStart(2,'0')
                    const s = String(seconds%60).padStart(2,'0')
                    document.getElementById('timer').textContent = `${m}:${s}`
                    if (seconds >= 30) toggleRecord()
                }, 1000)
            } else {
                clearInterval(timer)
                recorder.stop()
                recording = false
                document.getElementById('recordBtn').classList.remove('recording')
                document.getElementById('recordIcon').textContent = '🎙️'
                document.getElementById('recordText').textContent = '重新录制'
                document.getElementById('timer').style.display = 'none'
            }
        }

        async function uploadAudio() {
            try {
                const {url, params} = await fetch('/api/upload-url').then(r => r.json())
                
                const form = new FormData()
                Object.entries(params).forEach(([k,v]) => form.append(k,v))
                form.append('file', blob)
                
                const res = await fetch(url, {method:'POST', body:form})
                const data = await res.json()
                
                if (data.secure_url) {
                    voiceUrl = data.secure_url
                    document.getElementById('submitBtn').disabled = false
                    showStatus('✅ 上传成功，可以封存了', 'success')
                } else {
                    throw new Error('上传失败')
                }
            } catch(e) {
                showStatus('上传失败：' + e.message, 'error')
            }
        }

        async function submit() {
            const email = document.getElementById('email').value.trim()
            if (!email || !email.includes('@')) {
                showStatus('请输入正确的邮箱', 'error')
                return
            }
            
            document.getElementById('submitBtn').disabled = true
            document.getElementById('submitBtn').textContent = '封存中...'
            
            try {
                const res = await fetch('/api/submit', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({
                        email,
                        voice_url: voiceUrl,
                        message: document.getElementById('message').value
                    })
                })
                
                const data = await res.json()
                if (data.success) {
                    showStatus(`🎉 封存成功！<br>将在 <b>${data.send_date}</b> 发送到你的邮箱`, 'success')
                    setTimeout(() => location.reload(), 4000)
                } else {
                    throw new Error(data.error || '提交失败')
                }
            } catch(e) {
                showStatus('失败：' + e.message, 'error')
                document.getElementById('submitBtn').disabled = false
                document.getElementById('submitBtn').textContent = '封存胶囊'
            }
        }

        function showStatus(msg, type) {
            const s = document.getElementById('status')
            s.innerHTML = msg
            s.className = 'status show ' + type
        }
    </script>
</body>
</html>
