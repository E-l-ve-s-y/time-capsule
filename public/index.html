<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时光胶囊 · 交大130周年</title>
    <link rel="icon" href="https://www.sjtu.edu.cn/resource/assets/img/logo.png" type="image/png">
    
    <style>
        :root {
            --sjtu-red: #9e0023; /* 交大红 */
        }

        *{margin:0;padding:0;box-sizing:border-box}
        
        body {
            font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 背景层：高斯模糊处理你提供的包图照片 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('https://v2.567899.xyz/file/06611ec44f83d61074a248b1d4056639.jpg') no-repeat center center;
            background-size: cover;
            filter: blur(20px) brightness(0.85); /* 20px 高斯模糊 */
            transform: scale(1.1); /* 防止边缘发白 */
            z-index: -1;
        }

        .card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
        }

        h1 { color: var(--sjtu-red); margin-bottom: 8px; font-size: 26px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 30px; line-height: 1.5; }

        input, textarea {
            width: 100%;
            padding: 14px;
            border: 1.5px solid #eee;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 15px;
            transition: all 0.3s;
            background: #fdfdfd;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--sjtu-red);
            background: white;
            box-shadow: 0 0 0 4px rgba(158, 0, 35, 0.1);
        }

        /* 录音按钮美化 */
        .record-btn {
            width: 100%;
            height: 110px;
            border: 2px dashed #ccc;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-bottom: 15px;
            transition: all 0.3s;
            background: white;
        }
        .record-btn:hover { border-color: var(--sjtu-red); background: #fffcfc; }
        
        /* 录音时的呼吸灯动画 */
        .record-btn.recording {
            border-color: var(--sjtu-red);
            background: #fff5f5;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(158, 0, 35, 0.2); }
            70% { box-shadow: 0 0 0 10px rgba(158, 0, 35, 0); }
            100% { box-shadow: 0 0 0 0 rgba(158, 0, 35, 0); }
        }

        #recordIcon { font-size: 30px; margin-bottom: 5px; }
        .timer { font-size: 22px; font-weight: bold; color: var(--sjtu-red); font-family: monospace; }

        button#submitBtn {
            width: 100%;
            padding: 16px;
            background: var(--sjtu-red);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(158, 0, 35, 0.15);
        }
        button#submitBtn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.1); }
        button#submitBtn:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }

        .status { margin-top: 15px; padding: 12px; border-radius: 8px; display: none; font-size: 14px; }
        .status.show { display: block; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        audio { width: 100%; margin-bottom: 15px; display: none; height: 35px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎓 时光胶囊</h1>
        <p class="subtitle">致 130 周年校庆的自己<br>录制 30s 语音，130 天后自动送达</p>
        
        <input type="email" id="email" placeholder="your@email.com (接收地址)" required>
        
        <div class="record-btn" id="recordBtn" onclick="toggleRecord()">
            <div id="recordIcon">🎙️</div>
            <div id="recordText">点击开始录音</div>
            <div class="timer" id="timer" style="display:none">00:00</div>
        </div>
        
        <audio id="preview" controls></audio>
        <textarea id="message" rows="2" placeholder="给未来的自己写句话..."></textarea>
        
        <button id="submitBtn" onclick="submit()" disabled>封存这份时光</button>
        <div class="status" id="status"></div>
    </div>

    <script>
        let recorder, chunks = [], blob, voiceUrl, recording = false, timer, seconds = 0;
        const originalTitle = document.title;

        async function toggleRecord() {
            if (!recorder) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
                    recorder = new MediaRecorder(stream);
                    recorder.ondataavailable = e => chunks.push(e.data);
                    recorder.onstop = async () => {
                        blob = new Blob(chunks, {type:'audio/webm'});
                        document.getElementById('preview').src = URL.createObjectURL(blob);
                        document.getElementById('preview').style.display = 'block';
                        showStatus('正在上传...', 'info');
                        await uploadAudio();
                    }
                } catch(err) {
                    alert('请允许麦克风权限');
                    return;
                }
            }
            
            if (!recording) {
                chunks = [];
                recorder.start();
                recording = true;
                seconds = 0;
                document.getElementById('recordBtn').classList.add('recording');
                document.getElementById('recordIcon').textContent = '⏹️';
                document.getElementById('recordText').textContent = '点击停止';
                document.getElementById('timer').style.display = 'block';
                document.title = "🔴 正在录音..."; // 动态修改标题
                
                timer = setInterval(() => {
                    seconds++;
                    const m = String(Math.floor(seconds/60)).padStart(2,'0');
                    const s = String(seconds%60).padStart(2,'0');
                    document.getElementById('timer').textContent = `${m}:${s}`;
                    if (seconds >= 30) toggleRecord();
                }, 1000);
            } else {
                clearInterval(timer);
                recorder.stop();
                recording = false;
                document.getElementById('recordBtn').classList.remove('recording');
                document.getElementById('recordIcon').textContent = '🎙️';
                document.getElementById('recordText').textContent = '重新录制';
                document.getElementById('timer').style.display = 'none';
                document.title = originalTitle; // 恢复标题
            }
        }

        async function uploadAudio() {
            try {
                const {url, params} = await fetch('/api/upload-url').then(r => r.json());
                const form = new FormData();
                Object.entries(params).forEach(([k,v]) => form.append(k,v));
                form.append('file', blob);
                const res = await fetch(url, {method:'POST', body:form});
                const data = await res.json();
                if (data.secure_url) {
                    voiceUrl = data.secure_url;
                    document.getElementById('submitBtn').disabled = false;
                    showStatus('✅ 胶囊已准备就绪', 'success');
                }
            } catch(e) { showStatus('上传失败，请刷新重试', 'error'); }
        }

        async function submit() {
            const email = document.getElementById('email').value.trim();
            if (!email || !email.includes('@')) return showStatus('请输入有效邮箱', 'error');
            
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').textContent = '正在封存...';
            
            try {
                const res = await fetch('/api/submit', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({
                        email,
                        voice_url: voiceUrl,
                        message: document.getElementById('message').value
                    })
                });
                const data = await res.json();
                if (data.success) {
                    showStatus(`🎉 封存成功！<br>将在 <b>${data.send_date}</b> 送达`, 'success');
                    setTimeout(() => location.reload(), 4000);
                }
            } catch(e) {
                showStatus('提交失败', 'error');
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('submitBtn').textContent = '封存胶囊';
            }
        }

        function showStatus(msg, type) {
            const s = document.getElementById('status');
            s.innerHTML = msg;
            s.className = 'status show ' + type;
        }
    </script>
</body>
</html>
